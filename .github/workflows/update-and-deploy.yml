name: 更新 Polymarket 数据并部署网页

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 生成钱包排名
        run: python polymarket_profit_system.py analyze --config config.lite.json

      - name: 生成近期信号
        run: python polymarket_profit_system.py signals --config config.lite.json

      - name: 准备 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传网页文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
